<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数媒艺路 — 数字媒体艺术科普APP</title>
<style>
/* ============================
   DESIGN SYSTEM — 蓝紫科技艺术风
   ============================ */
:root {
  --primary: #6366F1;
  --primary-dark: #4F46E5;
  --primary-light: #EEF2FF;
  --accent: #7C3AED;
  --bg: #F8FAFC;
  --surface: #FFFFFF;
  --text: #1E293B;
  --text-secondary: #64748B;
  --text-muted: #94A3B8;
  --border: #E2E8F0;
  --border-light: #F1F5F9;
  --success: #10B981;
  --warning: #F59E0B;
  --error: #EF4444;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
  --shadow: 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.1);
  --font: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 16px; }
body {
  font-family: var(--font); background: #0F172A; color: var(--text);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }

/* App Container — iPhone 14 Pro 模拟 */
.app-container {
  width: 390px; max-width: 100vw; height: 844px; max-height: 100vh;
  background: var(--bg); position: relative; overflow: hidden;
  border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
  display: flex; flex-direction: column;
}
@media (max-width: 430px) {
  .app-container { width: 100vw; height: 100vh; border-radius: 0; max-height: 100vh; }
}

/* ===== Status Bar ===== */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 24px 6px; font-size: 12px; font-weight: 600;
  color: var(--text); flex-shrink: 0;
}

/* ===== Header ===== */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; flex-shrink: 0;
}
.app-header .back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: background .2s;
}
.app-header .back-btn:active { background: var(--border-light); }
.app-header .title { font-size: 17px; font-weight: 600; }
.app-header .action { width: 36px; height: 36px; }

/* ===== Page Container ===== */
.page-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.page-content::-webkit-scrollbar { display: none; }

/* ===== Bottom Tab Bar ===== */
.tab-bar {
  display: flex; justify-content: space-around; align-items: center;
  height: 56px; background: rgba(255,255,255,.85);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border); flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  flex: 1; padding: 6px 0; font-size: 10px; color: var(--text-muted);
  transition: color .2s;
}
.tab-item.active { color: var(--primary); }
.tab-item .tab-icon { font-size: 22px; }

/* ===== Screen visibility ===== */
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }

/* ============================
   SPLASH SCREEN
   ============================ */
.splash-screen {
  background: linear-gradient(160deg, #312E81 0%, #4F46E5 40%, #7C3AED 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; position: relative; overflow: hidden;
}
.splash-screen::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.06) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(99,102,241,.2) 0%, transparent 60%);
}
.splash-logo {
  width: 80px; height: 80px; border-radius: 22px;
  background: rgba(255,255,255,.15); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; color: #fff; position: relative; z-index: 1;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
  animation: splashPulse 2s ease-in-out infinite;
}
@keyframes splashPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.splash-title { font-size: 28px; font-weight: 700; color: #fff; position: relative; z-index: 1; letter-spacing: .04em; }
.splash-sub { font-size: 14px; color: rgba(255,255,255,.7); position: relative; z-index: 1; }
.splash-btn {
  margin-top: 40px; padding: 14px 48px; border-radius: 50px;
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  color: #fff; font-size: 16px; font-weight: 600; position: relative; z-index: 1;
  transition: all .2s; letter-spacing: .02em;
}
.splash-btn:active { background: rgba(255,255,255,.35); transform: scale(.97); }

/* ============================
   LOGIN SCREEN
   ============================ */
.login-screen { background: var(--surface); }
.login-screen .page-content { display: flex; flex-direction: column; padding: 32px 24px; }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .icon {
  width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 12px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: #fff; box-shadow: 0 4px 20px rgba(99,102,241,.3);
}
.login-logo h2 { font-size: 22px; font-weight: 700; color: var(--text); }
.login-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
  border-radius: var(--radius); font-size: 15px; outline: none;
  transition: border-color .2s; background: var(--border-light);
}
.form-input:focus { border-color: var(--primary); background: var(--surface); }
.btn-primary {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff; font-size: 16px; font-weight: 600; transition: all .2s;
  box-shadow: 0 4px 16px rgba(99,102,241,.25);
}
.btn-primary:active { transform: scale(.98); opacity: .9; }
.btn-outline {
  width: 100%; padding: 14px; border-radius: var(--radius);
  border: 1.5px solid var(--border); color: var(--text-secondary);
  font-size: 16px; font-weight: 500; transition: all .2s;
}
.btn-outline:active { background: var(--border-light); }
.login-divider {
  display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-muted); font-size: 13px;
}
.login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ============================
   HOME SCREEN
   ============================ */
.home-hero {
  background: linear-gradient(160deg, #312E81 0%, #4F46E5 40%, #7C3AED 100%);
  padding: 20px 20px 28px; position: relative; overflow: hidden;
}
.home-hero::before {
  content: ''; position: absolute; top: -30%; right: -20%;
  width: 160px; height: 160px; border-radius: 50%;
  background: rgba(255,255,255,.06);
}
.home-hero h1 { font-size: 24px; font-weight: 700; color: #fff; position: relative; z-index: 1; }
.home-hero p { font-size: 13px; color: rgba(255,255,255,.75); margin-top: 4px; position: relative; z-index: 1; }
.home-hero .search-box {
  display: flex; align-items: center; gap: 8px; margin-top: 16px;
  padding: 10px 16px; background: rgba(255,255,255,.15); backdrop-filter: blur(8px);
  border-radius: 50px; color: rgba(255,255,255,.6); font-size: 14px;
  position: relative; z-index: 1;
}

.section-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 12px; }
.section-header h3 { font-size: 17px; font-weight: 600; }
.section-header span { font-size: 13px; color: var(--primary); }

/* Feature grid — 3 cols */
.feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px; }
.feature-card {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 16px 8px; border-radius: var(--radius-lg); background: var(--surface);
  box-shadow: var(--shadow-sm); transition: all .2s; text-align: center;
}
.feature-card:active { transform: scale(.96); }
.feature-card .fc-icon {
  width: 44px; height: 44px; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.feature-card .fc-label { font-size: 12px; font-weight: 500; color: var(--text); }

/* Recommend cards */
.recommend-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
.rec-card {
  display: flex; gap: 14px; padding: 14px; border-radius: var(--radius-lg);
  background: var(--surface); box-shadow: var(--shadow-sm);
  transition: all .2s; align-items: center;
}
.rec-card:active { transform: scale(.98); }
.rec-card .rec-icon {
  width: 52px; height: 52px; border-radius: var(--radius); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 26px;
}
.rec-card .rec-info { flex: 1; min-width: 0; }
.rec-card .rec-title { font-size: 15px; font-weight: 600; color: var(--text); }
.rec-card .rec-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rec-card .rec-tag { font-size: 11px; color: var(--primary); background: var(--primary-light); padding: 3px 10px; border-radius: 50px; font-weight: 500; }

/* ============================
   MODULE LIST SCREEN
   ============================ */
.module-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
.module-card {
  padding: 20px 14px; border-radius: var(--radius-lg); background: var(--surface);
  box-shadow: var(--shadow-sm); transition: all .2s; position: relative; overflow: hidden;
}
.module-card:active { transform: scale(.97); }
.module-card .mc-icon { font-size: 32px; margin-bottom: 10px; }
.module-card .mc-title { font-size: 15px; font-weight: 600; color: var(--text); }
.module-card .mc-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }

/* ============================
   DETAIL / CONTENT SCREEN
   ============================ */
.detail-hero {
  background: linear-gradient(160deg, #312E81 0%, #4F46E5 40%, #7C3AED 100%);
  padding: 20px 20px 24px; position: relative; overflow: hidden;
}
.detail-hero::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 24px;
  background: var(--bg); border-radius: 20px 20px 0 0;
}
.detail-hero h2 { font-size: 20px; font-weight: 700; color: #fff; position: relative; z-index: 1; }
.detail-hero p { font-size: 13px; color: rgba(255,255,255,.75); margin-top: 4px; position: relative; z-index: 1; }

.detail-body { padding: 0 16px 24px; }
.info-card {
  padding: 16px; border-radius: var(--radius-lg); background: var(--surface);
  box-shadow: var(--shadow-sm); margin-bottom: 12px;
}
.info-card h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.info-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

/* Timeline */
.timeline-node {
  display: flex; gap: 14px; padding-bottom: 20px; position: relative;
}
.timeline-node::before {
  content: ''; position: absolute; left: 15px; top: 32px; bottom: 0;
  width: 2px; background: linear-gradient(to bottom, var(--primary), var(--accent), transparent);
}
.timeline-node:last-child::before { display: none; }
.timeline-dot {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px; font-weight: 700; z-index: 1;
}
.timeline-content { flex: 1; padding-bottom: 4px; }
.timeline-content .tl-year { font-size: 13px; color: var(--primary); font-weight: 600; }
.timeline-content .tl-title { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 2px; }
.timeline-content .tl-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.6; }

/* Glossary */
.glossary-item {
  padding: 14px 0; border-bottom: 1px solid var(--border-light);
  transition: all .2s;
}
.glossary-item .gl-term { font-size: 15px; font-weight: 600; color: var(--text); display: flex; justify-content: space-between; align-items: center; }
.glossary-item .gl-def { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-top: 6px; display: none; }
.glossary-item.expanded .gl-def { display: block; }
.glossary-item .gl-arrow { transition: transform .2s; font-size: 14px; color: var(--text-muted); }
.glossary-item.expanded .gl-arrow { transform: rotate(180deg); }

/* Case card */
.case-card {
  border-radius: var(--radius-lg); overflow: hidden; background: var(--surface);
  box-shadow: var(--shadow-sm); margin-bottom: 14px;
}
.case-card .case-img {
  height: 140px; display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}
.case-card .case-body { padding: 14px; }
.case-card .case-body h4 { font-size: 15px; font-weight: 600; }
.case-card .case-body p { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.6; }

/* Tab filter */
.filter-tabs { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; }
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 7px 16px; border-radius: 50px; font-size: 13px; font-weight: 500;
  white-space: nowrap; background: var(--border-light); color: var(--text-secondary);
  transition: all .2s; flex-shrink: 0;
}
.filter-tab.active { background: var(--primary); color: #fff; }

/* ============================
   QUIZ SCREEN
   ============================ */
.quiz-card {
  margin: 0 16px 16px; padding: 24px 20px; border-radius: var(--radius-xl);
  background: var(--surface); box-shadow: var(--shadow-sm);
}
.quiz-progress {
  display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
}
.quiz-progress .bar {
  flex: 1; height: 6px; border-radius: 3px; background: var(--border-light); overflow: hidden;
}
.quiz-progress .bar-fill {
  height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary), var(--accent));
  transition: width .3s;
}
.quiz-progress .count { font-size: 13px; color: var(--text-muted); }
.quiz-question { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 20px; line-height: 1.5; }
.quiz-option {
  width: 100%; padding: 14px 16px; border-radius: var(--radius); border: 2px solid var(--border);
  text-align: left; font-size: 15px; margin-bottom: 10px; transition: all .2s; display: flex; align-items: center; gap: 10px;
}
.quiz-option:active { transform: scale(.98); }
.quiz-option.selected { border-color: var(--primary); background: var(--primary-light); }
.quiz-option.correct { border-color: var(--success); background: #ECFDF5; }
.quiz-option.wrong { border-color: var(--error); background: #FFF1F2; }
.quiz-option .opt-letter { width: 28px; height: 28px; border-radius: 50%; background: var(--border-light); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.quiz-option.selected .opt-letter { background: var(--primary); color: #fff; }

/* Quiz home */
.quiz-home-card {
  margin: 0 16px 16px; padding: 20px; border-radius: var(--radius-xl);
  background: var(--surface); box-shadow: var(--shadow-sm); transition: all .2s;
}
.quiz-home-card:active { transform: scale(.98); }
.quiz-home-card .qh-icon { font-size: 36px; margin-bottom: 10px; }
.quiz-home-card .qh-title { font-size: 17px; font-weight: 600; }
.quiz-home-card .qh-desc { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

/* Result */
.result-hero {
  text-align: center; padding: 40px 20px;
  background: linear-gradient(160deg, #312E81 0%, #4F46E5 40%, #7C3AED 100%);
  margin: 0 16px; border-radius: var(--radius-xl); color: #fff;
}
.result-score { font-size: 56px; font-weight: 700; }
.result-msg { font-size: 16px; opacity: .9; margin-top: 4px; }
.result-detail { padding: 20px 16px; }
.result-detail h4 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

/* ============================
   PROFILE SCREEN
   ============================ */
.profile-header {
  background: linear-gradient(160deg, #312E81 0%, #4F46E5 40%, #7C3AED 100%);
  padding: 24px 20px 32px; position: relative; overflow: hidden;
}
.profile-header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 20px;
  background: var(--bg); border-radius: 16px 16px 0 0;
}
.profile-avatar {
  width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff; margin-bottom: 10px;
}
.profile-header .ph-name { font-size: 20px; font-weight: 700; color: #fff; }
.profile-header .ph-email { font-size: 13px; color: rgba(255,255,255,.7); }
.stats-row { display: flex; gap: 12px; padding: 0 16px; margin-top: -10px; position: relative; z-index: 1; }
.stat-card {
  flex: 1; padding: 16px; border-radius: var(--radius-lg); background: var(--surface);
  box-shadow: var(--shadow-sm); text-align: center;
}
.stat-card .stat-num { font-size: 22px; font-weight: 700; color: var(--primary); }
.stat-card .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.menu-list { padding: 16px; }
.menu-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; background: var(--surface); border-radius: var(--radius);
  margin-bottom: 8px; box-shadow: var(--shadow-sm); font-size: 14px; font-weight: 500;
}
.menu-item:active { background: var(--border-light); }
.menu-item .mi-left { display: flex; align-items: center; gap: 10px; }
.menu-item .mi-icon { font-size: 20px; }

/* ===== Spacing utils ===== */
.px-4 { padding-left: 16px; padding-right: 16px; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 10px 24px; border-radius: 50px;
  font-size: 14px; z-index: 200; opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app-container" id="app">

  <!-- ==================== SPLASH ==================== -->
  <div class="screen splash-screen active" id="screen-splash">
    <div class="splash-logo">🎨</div>
    <div class="splash-title">数媒艺路</div>
    <div class="splash-sub">从零开始认识数字媒体艺术</div>
    <button class="splash-btn" onclick="navigateTo('login')">开始探索</button>
  </div>

  <!-- ==================== LOGIN ==================== -->
  <div class="screen login-screen" id="screen-login">
    <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
    <div class="page-content">
      <div class="login-logo">
        <div class="icon">🎨</div>
        <h2>欢迎来到数媒艺路</h2>
        <p>一站式数字媒体艺术学习平台</p>
      </div>
      <div class="form-group"><label>邮箱</label><input class="form-input" type="email" placeholder="请输入邮箱"></div>
      <div class="form-group"><label>密码</label><input class="form-input" type="password" placeholder="请输入密码"></div>
      <button class="btn-primary" onclick="navigateTo('home')">登 录</button>
      <div class="login-divider">或</div>
      <button class="btn-outline" onclick="navigateTo('home')">游客模式进入</button>
    </div>
  </div>

  <!-- ==================== MAIN APP SHELL ==================== -->
  <div class="screen" id="screen-main">
    <!-- Sub-screen container -->
    <div id="main-content" style="display:flex;flex-direction:column;flex:1;overflow:hidden;"></div>
    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-item active" data-tab="home" onclick="switchTab('home')"><span class="tab-icon">🏠</span>首页</button>
      <button class="tab-item" data-tab="explore" onclick="switchTab('explore')"><span class="tab-icon">🔍</span>探索</button>
      <button class="tab-item" data-tab="quiz" onclick="switchTab('quiz')"><span class="tab-icon">📝</span>测验</button>
      <button class="tab-item" data-tab="profile" onclick="switchTab('profile')"><span class="tab-icon">👤</span>我的</button>
    </nav>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ============================
// NAVIGATION
// ============================
function navigateTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('screen-' + screen);
  if (target) { target.classList.add('active'); }
  if (screen === 'home' || screen === 'explore' || screen === 'quiz' || screen === 'profile') {
    document.getElementById('screen-main').classList.add('active');
    switchTab(screen);
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab-item[data-tab="${tab}"]`)?.classList.add('active');
  const main = document.getElementById('main-content');
  switch(tab) {
    case 'home': main.innerHTML = renderHome(); break;
    case 'explore': main.innerHTML = renderExplore(); break;
    case 'quiz': main.innerHTML = renderQuizHome(); break;
    case 'profile': main.innerHTML = renderProfile(); break;
  }
  document.getElementById('screen-main').classList.add('active');
  document.getElementById('screen-splash')?.classList.remove('active');
  document.getElementById('screen-login')?.classList.remove('active');
  // Scroll to top
  const pc = document.querySelector('#main-content .page-content');
  if (pc) pc.scrollTop = 0;
}

const quizData = [
  {q:'数字媒体艺术最核心的特征不包括以下哪一项？',opts:['交互性','虚拟性','永久性','生成性'],ans:2},
  {q:'首个自主绘画的AI程序AARON诞生于哪一年？',opts:['1963','1973','1983','1993'],ans:1},
  {q:'以下哪款工具主要用于实时交互媒体的快速原型开发？',opts:['Photoshop','Figma','TouchDesigner','VS Code'],ans:2},
  {q:'teamLab Borderless 的艺术类型属于？',opts:['传统油画','雕塑','沉浸式数字艺术','行为艺术'],ans:2},
  {q:'纪念碑谷的设计灵感主要来源于？',opts:['莫奈印象派','埃舍尔不可能几何','毕加索立体主义','蒙德里安风格派'],ans:1},
];
let quizState = {current:0,answers:[],submitted:false};

function renderQuizHome() {
  return `
    <div class="page-content">
      <div class="section-header"><h3>互动测验</h3></div>
      <div class="quiz-home-card" onclick="startQuiz('knowledge')" style="background:linear-gradient(135deg,#EEF2FF,#E8E5FF)">
        <div class="qh-icon">📚</div><div class="qh-title">知识测验</div>
        <div class="qh-desc">5道选择题，测试你对数字媒体艺术的掌握程度</div>
      </div>
      <div class="quiz-home-card" onclick="startQuiz('interest')" style="background:linear-gradient(135deg,#F3E8FF,#FFE4E6)">
        <div class="qh-icon">🎯</div><div class="qh-title">兴趣测验</div>
        <div class="qh-desc">发现你最适合的数字媒体艺术方向</div>
      </div>
    </div>`;
}

function startQuiz(type) {
  if (type === 'interest') {
    showToast('兴趣测验即将上线');
    return;
  }
  quizState = {current:0,answers:new Array(quizData.length).fill(-1),submitted:false};
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const q = quizData[quizState.current];
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
    <div class="app-header">
      <button class="back-btn" onclick="switchTab('quiz')">←</button>
      <span class="title">知识测验</span>
      <div class="action"></div>
    </div>
    <div class="page-content">
      <div class="quiz-card">
        <div class="quiz-progress">
          <div class="bar"><div class="bar-fill" style="width:${((quizState.current+1)/quizData.length)*100}%"></div></div>
          <span class="count">${quizState.current+1}/${quizData.length}</span>
        </div>
        <div class="quiz-question">${quizState.current+1}. ${q.q}</div>
        ${q.opts.map((o,i) => {
          let cls = '';
          if (quizState.submitted) {
            if (i === q.ans) cls = 'correct';
            else if (i === quizState.answers[quizState.current] && i !== q.ans) cls = 'wrong';
          } else if (quizState.answers[quizState.current] === i) {
            cls = 'selected';
          }
          return `<button class="quiz-option ${cls}" onclick="selectAnswer(${i})">
            <span class="opt-letter">${'ABCD'[i]}</span>${o}
          </button>`;
        }).join('')}
        <div style="display:flex;gap:12px;margin-top:16px">
          ${quizState.current > 0 ? '<button class="btn-outline" style="flex:1" onclick="prevQuestion()">上一题</button>' : ''}
          ${quizState.current < quizData.length-1
            ? `<button class="btn-primary" style="flex:1" onclick="nextQuestion()">下一题</button>`
            : `<button class="btn-primary" style="flex:1" onclick="submitQuiz()">提交</button>`
          }
        </div>
      </div>
    </div>`;
}

function selectAnswer(i) {
  if (quizState.submitted) return;
  quizState.answers[quizState.current] = i;
  renderQuizQuestion();
}
function nextQuestion() {
  if (quizState.current < quizData.length-1) { quizState.current++; renderQuizQuestion(); }
}
function prevQuestion() {
  if (quizState.current > 0) { quizState.current--; renderQuizQuestion(); }
}
function submitQuiz() {
  if (quizState.answers.includes(-1)) { showToast('请完成所有题目'); return; }
  quizState.submitted = true;
  const correct = quizState.answers.reduce((c,a,i) => c + (a === quizData[i].ans ? 1 : 0), 0);
  const score = Math.round((correct / quizData.length) * 100);
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>

      <div class="result-detail">

          <div class="info-card" style="border-left:3px solid ${quizState.answers[i]===q.ans?'var(--success)':'var(--error)'}">
            <h4>${i+1}. ${q.q}</h4>
            <p style="font-size:12px;color:var(--text-muted)">你的答案：${'ABCD'[quizState.answers[i]]}. ${q.opts[quizState.answers[i]]}</p>
            ${quizState.answers[i]!==q.ans ? `<p style="font-size:12px;color:var(--success)">正确答案：${'ABCD'[q.ans]}. ${q.opts[q.ans]}</p>` : ''}
          </div>
        `).join('')}
        <button class="btn-primary mt-4" onclick="startQuiz('knowledge')">再来一次</button>
      </div>
    </div>`;
}

function toggleGlossary(i) {
  document.getElementById('gl-'+i)?.classList.toggle('expanded');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 1800);
}

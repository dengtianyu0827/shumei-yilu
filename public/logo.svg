<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Digital path lines -->
  <circle cx="160" cy="180" r="24" fill="#fff" opacity="0.9"/>
  <circle cx="260" cy="140" r="16" fill="#fff" opacity="0.7"/>
  <circle cx="340" cy="200" r="12" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="320" r="20" fill="#fff" opacity="0.8"/>
  <circle cx="310" cy="300" r="14" fill="#fff" opacity="0.6"/>
  <circle cx="370" cy="360" r="10" fill="#fff" opacity="0.4"/>
  <!-- Connecting lines -->
  <line x1="260" y1="140" x2="340" y2="200" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <line x1="160" y1="180" x2="260" y2="140" stroke="#fff" stroke-width="2" opacity="0.25"/>
  <line x1="200" y1="320" x2="310" y2="300" stroke="#fff" stroke-width="2" opacity="0.25"/>
  <!-- Center element: art brush / media icon -->
  <g transform="translate(200, 220)">
    <path d="M50 0 L80 0 L70 60 Q65 80 40 100 Q20 80 30 50 Z" fill="#fff" opacity="0.95"/>
    <circle cx="75" cy="-12" r="10" fill="#FDE68A"/>
    <circle cx="95" cy="15" r="8" fill="#C084FC"/>
    <circle cx="85" cy="50" r="6" fill="#93C5FD"/>
  </g>
  <!-- Small decorative elements -->
  <circle cx="130" cy="400" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="380" cy="130" r="8" fill="#fff" opacity="0.3"/>
  <circle cx="400" cy="280" r="6" fill="#fff" opacity="0.25"/>
  <circle cx="140" cy="250" r="5" fill="#fff" opacity="0.2"/>
</svg>

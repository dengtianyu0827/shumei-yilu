<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数媒艺路 — 数字媒体艺术导航</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --color-primary: #4F46E5;
  --color-primary-dark: #4338CA;
  --color-primary-light: #EEF2FF;
  --color-warm: #F59E0B;
  --color-warm-light: #FFFBF0;
  --color-bg: #FAFAF8;
  --color-surface: #FFFFFF;
  --color-text: #1E293B;
  --color-text-secondary: #64748B;
  --color-text-muted: #94A3B8;
  --color-border: #E2E8F0;
  --color-border-light: #F1F5F9;
  --sidebar-width: 240px;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-full: 999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.05);
  --shadow-hover: 0 12px 32px rgba(0,0,0,.1);
  --transition: 220ms cubic-bezier(.4,0,.2,1);
  --transition-spring: 350ms cubic-bezier(.34,1.56,.64,1);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 24px; }
body {
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  font-size: 15px; line-height: 1.6; color: var(--color-text);
  background:
    /* 点阵粒子层 — 象征数字像素、数据脉络 */
    radial-gradient(circle at 25% 25%, rgba(79,70,229,.07) 1px, transparent 1px),
    radial-gradient(circle at 75% 75%, rgba(124,58,237,.05) 1.5px, transparent 1.5px),
    /* 弥散光斑 — 低饱和蓝紫柔化渐变 */
    radial-gradient(ellipse at 15% 10%, rgba(79,70,229,.04) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(124,58,237,.03) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 70%, rgba(79,70,229,.02) 0%, transparent 40%),
    /* 纯色底 */
    var(--color-bg);
  background-size:
    28px 28px,
    32px 32px,
    100% 100%, 100% 100%, 100% 100%, 100% 100%;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

/* ===== Layout ===== */
.app-layout { display: flex; min-height: 100vh; }

/* ===== Sidebar ===== */
.sidebar {
  position: fixed; top: 0; left: 0; z-index: 50;
  width: var(--sidebar-width); height: 100vh;
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  display: flex; flex-direction: column;
  transition: transform var(--transition-spring);
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--color-border-light);
  background: linear-gradient(to bottom, rgba(79,70,229,.03), transparent);
}
.sidebar-brand .logo {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  box-shadow: 0 4px 12px rgba(79,70,229,.25);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 19px; font-weight: 700;
}
.sidebar-brand .name { font-size: 17px; font-weight: 700; color: var(--color-text); letter-spacing: .02em; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 14px 10px; }
.sidebar-nav .nav-section {
  font-size: 11px; letter-spacing: .06em;
  color: var(--color-text-muted); padding: 6px 14px 8px; font-weight: 600;
  text-transform: uppercase;
}
.sidebar-nav .nav-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 10px 14px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 14px; font-weight: 500; color: var(--color-text-secondary);
  transition: all var(--transition); text-align: left;
  border-left: 3px solid transparent;
  position: relative;
}
.sidebar-nav .nav-item:hover {
  background: var(--color-primary-light); color: var(--color-primary);
  border-left-color: rgba(79,70,229,.3);
}
.sidebar-nav .nav-item.active {
  background: var(--color-primary-light); color: var(--color-primary);
  font-weight: 600; border-left-color: var(--color-primary);
}
.sidebar-nav .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }

/* ===== Overlay (mobile) ===== */
.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 49;
  opacity: 0; pointer-events: none; transition: opacity 300ms ease;
}
.sidebar-overlay.show { opacity: 1; pointer-events: auto; }

/* ===== Main Content ===== */
.main-content { flex: 1; margin-left: var(--sidebar-width); min-width: 0; }

/* ===== Header / Search ===== */
.top-bar {
  position: sticky; top: 0; z-index: 30;
  background: rgba(255,255,255,.85); backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border-bottom: 1px solid var(--color-border);
  padding: 14px 24px; display: flex; align-items: center; gap: 12px;
}
.hamburger {
  display: none; width: 40px; height: 40px; border-radius: var(--radius-sm);
  align-items: center; justify-content: center; flex-shrink: 0;
  transition: background var(--transition);
}
.hamburger:hover { background: var(--color-border-light); }
.hamburger svg { width: 22px; height: 22px; stroke: var(--color-text); }

.search-wrapper {
  flex: 1; display: flex; max-width: 600px; position: relative;
  background: var(--color-border-light); border-radius: var(--radius-full);
  border: 1px solid transparent; transition: all var(--transition);
  overflow: hidden;
}
.search-wrapper:focus-within {
  background: var(--color-surface); border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}
.engine-toggle {
  display: flex; align-items: center; gap: 5px;
  padding: 9px 16px; font-size: 13px; font-weight: 500;
  color: var(--color-text-secondary); white-space: nowrap;
  transition: all var(--transition);
  border-right: 1px solid var(--color-border);
}
.engine-toggle:hover { background: var(--color-border); color: var(--color-text); }
.engine-toggle .caret { font-size: 10px; transition: transform var(--transition); }
.engine-dropdown {
  display: none; position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); box-shadow: var(--shadow-hover);
  z-index: 40; min-width: 130px; overflow: hidden; padding: 4px;
}
.engine-dropdown.show { display: block; }
.engine-option {
  display: block; width: 100%; padding: 8px 14px; font-size: 13px; text-align: left;
  border-radius: var(--radius-sm); transition: all var(--transition);
}
.engine-option:hover { background: var(--color-primary-light); color: var(--color-primary); }
.search-input {
  flex: 1; padding: 9px 16px; border: none; font-size: 14px;
  outline: none; background: transparent;
}
.search-input::placeholder { color: var(--color-text-muted); }
.search-btn {
  margin-left: 4px; padding: 9px 22px; border-radius: var(--radius-full);
  background: var(--color-primary); color: #fff; font-size: 14px; font-weight: 500;
  transition: all var(--transition); white-space: nowrap;
  box-shadow: 0 2px 8px rgba(79,70,229,.2);
}
.search-btn:hover { background: var(--color-primary-dark); box-shadow: 0 4px 16px rgba(79,70,229,.35); transform: translateY(-1px); }
.search-btn:active { transform: scale(.97); }

/* ===== Content Area ===== */
.content-area { padding: 28px 32px 64px; max-width: 900px; }

/* ===== Top Banner (流体渐变光效) ===== */
.content-banner {
  position: relative; margin-bottom: 36px; border-radius: var(--radius-lg);
  padding: 32px 28px; overflow: hidden;
  background: linear-gradient(135deg, #EEF2FF 0%, #E8E5FF 40%, #F3E8FF 100%);
}
.content-banner::before {
  content: ''; position: absolute; inset: 0;
  background:
    /* 漂浮几何光点 */
    radial-gradient(circle at 10% 20%, rgba(79,70,229,.15) 0%, transparent 30%),
    radial-gradient(circle at 90% 30%, rgba(124,58,237,.12) 0%, transparent 25%),
    radial-gradient(circle at 50% 70%, rgba(79,70,229,.08) 0%, transparent 35%),
    /* 微弱发光线条 */
    radial-gradient(ellipse at 30% 50%, rgba(79,70,229,.06) 0%, transparent 60%);
  z-index: 0;
}
.content-banner::after {
  content: ''; position: absolute; top: 30%; right: 5%;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(124,58,237,.08) 0%, transparent 70%);
  border-radius: 50%; z-index: 0;
}
.content-banner > * { position: relative; z-index: 1; }
.content-banner h2 {
  font-size: 22px; font-weight: 700; color: var(--color-text); margin-bottom: 6px;
}
.content-banner p {
  font-size: 14px; color: var(--color-text-secondary); line-height: 1.7;
}

/* ===== Category Section ===== */
.category-section { margin-bottom: 56px; padding-top: 16px; }
.category-title {
  font-size: 24px; font-weight: 700; color: var(--color-text);
  margin-bottom: 6px; display: flex; align-items: center; gap: 10px;
  letter-spacing: .02em;
}
.category-title .cat-icon { font-size: 28px; }
.category-desc { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 18px; line-height: 1.7; }

/* ===== Section Decorative Backgrounds ===== */
.category-section {
  position: relative;
  border-radius: var(--radius-lg);
  padding: 20px 24px 24px;
  margin-left: -12px; margin-right: -12px;
}

/* 渐变分区 — 交替使用浅色块增强视觉节奏 */
.category-section:nth-child(odd) {
  background: linear-gradient(135deg, rgba(79,70,229,.015) 0%, rgba(255,255,255,.6) 40%, rgba(124,58,237,.01) 100%);
}
.category-section:nth-child(even) {
  background: linear-gradient(225deg, rgba(124,58,237,.012) 0%, rgba(255,255,255,.5) 40%, rgba(79,70,229,.015) 100%);
}

/* ---- 认识数媒 — 几何切片块面 ---- */
#concepts::before {
  content: ''; position: absolute; top: 12px; right: 16px;
  width: 80px; height: 80px;
  background: linear-gradient(135deg, rgba(79,70,229,.06), rgba(124,58,237,.03));
  border-radius: 20px; transform: rotate(15deg); z-index: 0; pointer-events: none;
}
#concepts::after {
  content: ''; position: absolute; bottom: 20px; left: 20px;
  width: 50px; height: 50px;
  border: 2px dashed rgba(79,70,229,.08);
  border-radius: 12px; transform: rotate(-10deg); z-index: 0; pointer-events: none;
}

/* ---- 发展时间轴 — 节点轨迹线条 ---- */
#timeline::before {
  content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(79,70,229,.1) 20%, rgba(124,58,237,.15) 50%, rgba(79,70,229,.1) 80%, transparent);
  z-index: 0; pointer-events: none;
}
#timeline::after {
  content: ''; position: absolute; top: calc(50% - 3px); left: 10%;
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(79,70,229,.15); z-index: 0; pointer-events: none;
  box-shadow:
    80px 0 0 rgba(124,58,237,.12),
    160px 0 0 rgba(79,70,229,.1),
    240px 0 0 rgba(124,58,237,.08),
    320px 0 0 rgba(79,70,229,.06),
    400px 0 0 rgba(124,58,237,.04);
}

/* ---- 艺术形式 — 流动渐变波纹 ---- */
#art-forms::before {
  content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(circle at 20% 30%, rgba(79,70,229,.05) 0%, transparent 50%),
    radial-gradient(circle at 80% 60%, rgba(124,58,237,.04) 0%, transparent 50%),
    radial-gradient(circle at 50% 85%, rgba(79,70,229,.03) 0%, transparent 40%);
  border-radius: var(--radius-lg);
}

/* ---- 代表案例 — 深炭蓝紫暗底沉浸感 ---- */
#cases {
  background: linear-gradient(160deg, #1E1B4B 0%, #1E293B 40%, #0F172A 100%) !important;
  color: #E2E8F0;
}
#cases .category-title { color: #F1F5F9; }
#cases .category-desc { color: #94A3B8; }
#cases::before {
  content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(circle at 30% 20%, rgba(79,70,229,.15) 0%, transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(124,58,237,.1) 0%, transparent 35%),
    /* 微弱发光粒子 */
    radial-gradient(circle at 15% 40%, rgba(255,255,255,.04) 1px, transparent 1px),
    radial-gradient(circle at 60% 25%, rgba(255,255,255,.03) 1px, transparent 1px),
    radial-gradient(circle at 85% 55%, rgba(255,255,255,.05) 1px, transparent 1px),
    radial-gradient(circle at 35% 75%, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 50px 50px, 60px 60px, 40px 40px, 55px 55px;
  border-radius: var(--radius-lg);
}
#cases .sub-tab { background: rgba(255,255,255,.08); color: #CBD5E1; }
#cases .sub-tab:hover { background: rgba(255,255,255,.14); color: #F1F5F9; }
#cases .sub-tab.active { background: var(--color-primary); color: #fff; }
#cases .card { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.08); backdrop-filter: blur(8px); }
#cases .card:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.15); }
#cases .card-title { color: #F1F5F9; }
#cases .card-desc { color: #94A3B8; }
#cases .card-arrow { color: #64748B; }

/* ---- 技术词典 — 细密网格+全息渐变暗底 ---- */
#glossary {
  background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%) !important;
}
#glossary .category-title { color: #F1F5F9; }
#glossary .category-desc { color: #94A3B8; }
#glossary::before {
  content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    /* 网格线 */
    repeating-linear-gradient(0deg, rgba(79,70,229,.06) 0px, rgba(79,70,229,.06) 1px, transparent 1px, transparent 24px),
    repeating-linear-gradient(90deg, rgba(79,70,229,.06) 0px, rgba(79,70,229,.06) 1px, transparent 1px, transparent 24px),
    /* 全息渐变 */
    linear-gradient(135deg, rgba(79,70,229,.08) 0%, transparent 30%, rgba(124,58,237,.06) 70%, transparent 100%);
  border-radius: var(--radius-lg);
}
#glossary .sub-tab { background: rgba(255,255,255,.08); color: #CBD5E1; }
#glossary .sub-tab:hover { background: rgba(255,255,255,.14); color: #F1F5F9; }
#glossary .sub-tab.active { background: var(--color-primary); color: #fff; }
#glossary .card { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.08); backdrop-filter: blur(8px); }
#glossary .card:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.15); }
#glossary .card-title { color: #F1F5F9; }
#glossary .card-desc { color: #94A3B8; }
#glossary .card-arrow { color: #64748B; }

/* ---- 创作流程 — 细线光带装饰 ---- */
#creation::before {
  content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(79,70,229,.12), rgba(124,58,237,.15), rgba(79,70,229,.12), transparent);
  z-index: 0; pointer-events: none;
  border-radius: 1px;
}

/* 保证分区内容在装饰层上方 */
.category-section > * { position: relative; z-index: 1; }

/* ===== Sub Tabs (pill style) ===== */
.sub-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
.sub-tab {
  padding: 7px 18px; border-radius: var(--radius-full);
  font-size: 13px; font-weight: 500; color: var(--color-text-secondary);
  background: var(--color-border-light);
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.sub-tab:hover { background: var(--color-primary-light); color: var(--color-primary); }
.sub-tab.active { background: var(--color-primary); color: #fff; font-weight: 600; box-shadow: 0 2px 8px rgba(79,70,229,.25); }
.sub-tab:active { transform: scale(.96); }

/* ===== Card Grid ===== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.card {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 20px; border-radius: var(--radius-md);
  background: var(--color-surface); border: 1px solid var(--color-border-light);
  box-shadow: var(--shadow-sm); cursor: pointer;
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.card:hover {
  box-shadow: var(--shadow-hover); border-color: transparent;
  transform: translateY(-4px);
}
.card:active { transform: scale(.98); }
.card-icon {
  width: 48px; height: 48px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0; position: relative;
}
.card-icon::after {
  content: ''; position: absolute; inset: -4px; border-radius: 14px;
  opacity: .4; z-index: -1; transition: opacity var(--transition);
}
.card:hover .card-icon::after { opacity: .7; }
.card-icon.blue   { background: #EEF2FF; color: #4F46E5; }
.card-icon.blue::after   { background: #C7D2FE; }
.card-icon.purple { background: #F3E8FF; color: #9333EA; }
.card-icon.purple::after { background: #D8B4FE; }
.card-icon.green  { background: #ECFDF5; color: #059669; }
.card-icon.green::after  { background: #A7F3D0; }
.card-icon.amber  { background: #FFFBEB; color: #D97706; }
.card-icon.amber::after  { background: #FDE68A; }
.card-icon.rose   { background: #FFF1F2; color: #E11D48; }
.card-icon.rose::after   { background: #FECDD3; }
.card-icon.cyan   { background: #ECFEFF; color: #0891B2; }
.card-icon.cyan::after   { background: #A5F3FC; }
.card-icon.slate  { background: #F1F5F9; color: #475569; }
.card-icon.slate::after  { background: #CBD5E1; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 600; color: var(--color-text); margin-bottom: 3px; line-height: 1.4; }
.card-desc  { font-size: 13px; color: #6B7280; line-height: 1.7;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-arrow { color: var(--color-text-muted); flex-shrink: 0; align-self: center;
  transition: all var(--transition); font-size: 16px; opacity: .5; }
.card:hover .card-arrow { transform: translateX(4px); color: var(--color-primary); opacity: 1; }

/* ===== Footer ===== */
.content-footer {
  position: relative; text-align: center; padding: 36px 0 16px;
  color: var(--color-text-muted); font-size: 13px; letter-spacing: .02em;
}
.content-footer::before {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(79,70,229,.1), rgba(124,58,237,.08), transparent);
}
/* 页脚渐变网点 */
.content-footer::after {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 200px; height: 60px;
  background:
    radial-gradient(circle, rgba(79,70,229,.04) 1px, transparent 1px),
    radial-gradient(circle, rgba(124,58,237,.03) 1px, transparent 1px);
  background-size: 16px 16px, 20px 20px;
  z-index: 0; pointer-events: none;
}

/* ===== Responsive ===== */
@media (max-width: 1023px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .hamburger { display: flex; }
  .content-area { padding: 20px 16px 48px; }
  .card-grid { grid-template-columns: 1fr; }
  .top-bar { padding: 10px 16px; }
  .search-btn { padding: 8px 16px; font-size: 13px; }
  .category-title { font-size: 20px; }
  .category-title .cat-icon { font-size: 24px; }
  .category-section { margin-left: 0; margin-right: 0; padding: 16px; border-radius: var(--radius-md); }
  .content-banner { padding: 24px 18px; margin-bottom: 24px; }
  .content-banner h2 { font-size: 18px; }
  #concepts::before { width: 50px; height: 50px; top: 8px; right: 8px; }
  #concepts::after { width: 30px; height: 30px; bottom: 10px; left: 10px; }
  #timeline::after { box-shadow: 40px 0 0 rgba(124,58,237,.12), 80px 0 0 rgba(79,70,229,.1), 120px 0 0 rgba(124,58,237,.08); }
}
@media (min-width: 640px) and (max-width: 1023px) {
  .card-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="app-layout">

  <!-- ==================== SIDEBAR OVERLAY (mobile) ==================== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ==================== SIDEBAR ==================== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="logo">艺</div>
      <span class="name">数媒艺路</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">一级分类</div>
      <button class="nav-item active" data-target="concepts">
        <span class="nav-icon">💡</span>认识数媒
      </button>
      <button class="nav-item" data-target="timeline">
        <span class="nav-icon">⏱️</span>发展时间轴
      </button>
      <button class="nav-item" data-target="art-forms">
        <span class="nav-icon">🎨</span>艺术形式
      </button>
      <button class="nav-item" data-target="cases">
        <span class="nav-icon">🖼️</span>代表案例

function createCardHTML(item) {
  return `
    <a class="card" href="${item.url}" target="_blank" rel="noopener">
      <div class="card-icon ${item.color}">${item.icon}</div>
      <div class="card-body">
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.desc}</div>
      </div>
      <span class="card-arrow">→</span>
    </a>`;
}

for (const [key, items] of Object.entries(cardData)) {
  const el = document.getElementById('cards-' + key);
  if (el) el.innerHTML = items.map(createCardHTML).join('');
}

// ============================
// SUB-TAB SWITCHING
// ============================
document.querySelectorAll('.sub-tabs').forEach(tabGroup => {
  const category = tabGroup.dataset.category;
  tabGroup.addEventListener('click', e => {
    const tab = e.target.closest('.sub-tab');
    if (!tab) return;
    const sub = tab.dataset.sub;

    tabGroup.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    tabGroup.querySelectorAll('.sub-tab').forEach(t => {
      const grid = document.getElementById('cards-' + category + '-' + t.dataset.sub);
      if (grid) grid.style.display = t === tab ? '' : 'none';
    });
  });
});

// ============================
// SEARCH ENGINE
// ============================
let currentEngine = 'baidu';
const engineUrls = {
  baidu: 'https://www.baidu.com/s?wd=',
  google: 'https://www.google.com/search?q=',
  bing: 'https://www.bing.com/search?q=',
};

const engineToggle = document.getElementById('engineToggle');
const engineLabel = document.getElementById('engineLabel');
const engineDropdown = document.getElementById('engineDropdown');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');

engineToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  engineDropdown.classList.toggle('show');
});

document.addEventListener('click', () => {
  engineDropdown.classList.remove('show');
});

engineDropdown.addEventListener('click', (e) => {
  const opt = e.target.closest('.engine-option');
  if (!opt) return;
  currentEngine = opt.dataset.engine;
  engineLabel.textContent = opt.dataset.name;
  engineDropdown.classList.remove('show');
});

function doSearch() {
  const query = searchInput.value.trim();
  if (!query) return;
  window.open(engineUrls[currentEngine] + encodeURIComponent(query), '_blank');
}

searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});

// ============================
// SIDEBAR NAVIGATION
// ============================
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const hamburger = document.getElementById('hamburger');
const navItems = document.querySelectorAll('.nav-item');

function openSidebar() {
  sidebar.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}

hamburger.addEventListener('click', openSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

navItems.forEach(item => {
  item.addEventListener('click', () => {
    const targetId = item.dataset.target;
    const section = document.getElementById(targetId);
    if (section) {
      section.scrollIntoView({ behavior: 'smooth' });
    }
    closeSidebar();
  });
});

// ============================
// SCROLL SPY (Intersection Observer)
// ============================
const sections = document.querySelectorAll('.category-section');
const observerOptions = {
  rootMargin: '-80px 0px -60% 0px',
  threshold: 0,
};

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      navItems.forEach(item => {
        item.classList.toggle('active', item.dataset.target === id);
      });
    }
  });
}, observerOptions);

sections.forEach(section => observer.observe(section));
</script>
